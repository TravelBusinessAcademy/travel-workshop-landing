<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're In! — Synergy Powerhouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #fdfdfd;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 20px 40px;
      border-bottom: 1px solid #f1f5f9;
      background: #ffffff;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      text-decoration: none;
    }
    .brand span { color: #06b6d4; }

    /* ─── MAIN CONTENT ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    /* GRAPHIC BOX */
    .graphic-box {
      width: 100%;
      max-width: 700px;
      aspect-ratio: 16 / 9;
      margin-bottom: 48px;
      border-radius: 20px;
      background: linear-gradient(135deg, #06b6d4 0%, #0284c7 50%, #1e40af 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.2);
      font-size: 64px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(6, 182, 212, 0.25);
    }
    /* Decorative circles to make it look premium */
    .graphic-box::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 60px solid rgba(255,255,255,0.05);
      top: -100px; right: -100px;
    }
    .graphic-box::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      bottom: -80px; left: -80px;
    }
    .graphic-box i {
      position: relative;
      z-index: 1;
    }

    /* TIMER SECTION */
    .timer-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 24px;
    }
    .timer {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
    }
    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .timer-value {
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 700;
      line-height: 1;
      color: #0f172a;
    }
    .timer-key {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
      margin-top: 8px;
    }
    .timer-sep {
      font-size: clamp(48px, 8vw, 72px);
      line-height: 1;
      color: #cbd5e1;
      font-weight: 100;
    }

    /* TEXT SECTION */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 16px;
    }
    .headline span { color: #06b6d4; font-style: italic; }

    .subtext {
      font-size: 17px;
      color: #64748b;
      line-height: 1.7;
      max-width: 540px;
      margin: 0 auto 24px;
    }

    .highlight-text {
      font-size: 15px;
      font-weight: 600;
      color: #ea580c;
      background: rgba(234, 88, 12, 0.08);
      padding: 8px 16px;
      border-radius: 50px;
      display: inline-block;
      margin-bottom: 40px;
    }

    /* FOOTER */
    .footer {
      padding: 24px;
      text-align: center;
      border-top: 1px solid #f1f5f9;
      color: #94a3b8;
      font-size: 12px;
    }
    .footer a { color: #06b6d4; text-decoration: none; }

    /* MOBILE */
    @media (max-width: 640px) {
      .header { padding: 16px 20px; }
      .timer { gap: 12px; }
      .timer-sep { display: none; }
      .graphic-box { border-radius: 12px; margin-bottom: 32px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="https://travelbusinessacademy.github.io/travel-workshop-landing/" class="brand">
      SYNERGY<span>POWERHOUSE</span>
    </a>
  </header>

  <!-- MAIN CONTENT -->
  <section class="main">

    <!-- GRAPHIC (Placeholder for your globe/image) -->
    <div class="graphic-box">
      <i>🌍</i> <!-- Replace this icon with your actual <img> tag later -->
    </div>

    <!-- TIMER -->
    <div class="timer-label">Check your inbox — Your access link arrives in:</div>
    <div class="timer">
      <div class="timer-block">
        <span class="timer-value" id="hours">00</span>
        <span class="timer-key">Hours</span>
      </div>
      <span class="timer-sep">:</span>
      <div class="timer-block">
        <span class="timer-value" id="minutes">05</span>
        <span class="timer-key">Minutes</span>
      </div>
      <span class="timer-sep">:</span>
      <div class="timer-block">
        <span class="timer-value" id="seconds">00</span>
        <span class="timer-key">Seconds</span>
      </div>
    </div>

    <!-- TEXT -->
    <h1 class="headline">You're <span>In!</span></h1>
    <p class="subtext">
      "The world is full of magical things patiently waiting for our wits to grow sharper."
    </p>
    <div class="highlight-text">Thank You for joining Team Synergy Powerhouse.</div>

  </section>

  <!-- FOOTER -->
  <div class="footer">
    &copy; 2025 Travel Business Academy &middot; <a href="#">Privacy Policy</a>
  </div>

  <!-- COUNTDOWN SCRIPT -->
  <script>
    // Set the date we're counting down to (5 minutes from now for demo purposes)
    var countDownDate = new Date().getTime() + (5 * 60 * 1000);

    // Update the count down every 1 second
    var x = setInterval(function() {
      var now = new Date().getTime();
      var distance = countDownDate - now;

      // Time calculations
      var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((distance % (1000 * 60)) / 1000);

      // Output the result in elements with id
      document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
      document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
      document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

      // If the count down is over
      if (distance < 0) {
        clearInterval(x);
        document.getElementById("hours").innerHTML = "00";
        document.getElementById("minutes").innerHTML = "00";
        document.getElementById("seconds").innerHTML = "00";
        document.querySelector('.timer-label').textContent = "Check your email now!";
      }
    }, 1000);
  </script>

</body>
</html>
