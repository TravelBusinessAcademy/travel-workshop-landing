<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're In! — Team Synergy PowerHouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #fdfdfd;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 20px 40px;
      border-bottom: 1px solid #f1f5f9;
      background: #ffffff;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      text-decoration: none;
    }
    .brand span { color: #06b6d4; }

    /* ─── MAIN CONTENT ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    /* GRAPHIC BOX */
    .graphic-box {
      width: 100%;
      max-width: 700px;
      aspect-ratio: 16 / 9;
      margin-bottom: 48px;
      border-radius: 20px;
      background: linear-gradient(135deg, #06b6d4 0%, #0284c7 50%, #1e40af 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(6, 182, 212, 0.25);
      padding: 40px;
    }
    /* Decorative circles to make it look premium */
    .graphic-box::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 60px solid rgba(255,255,255,0.05);
      top: -100px; right: -100px;
    }
    .graphic-box::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      bottom: -80px; left: -80px;
    }
    .graphic-box-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .graphic-box-content .globe {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .graphic-box-content .quote {
      color: #ffffff;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(16px, 2.5vw, 22px);
      line-height: 1.6;
      max-width: 560px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* CHECK YOUR EMAIL */
    .check-email {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      color: #06b6d4;
      margin-bottom: 32px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-family: 'DM Sans', sans-serif;
    }

    /* TEXT SECTION */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 6vw, 60px);
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 16px;
    }
    .headline span { color: #06b6d4; font-style: italic; }

    .highlight-text {
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700;
      color: #ea580c;
      background: rgba(234, 88, 12, 0.1);
      padding: 14px 28px;
      border-radius: 50px;
      display: inline-block;
      line-height: 1.4;
    }

    /* FOOTER */
    .footer {
      padding: 24px;
      text-align: center;
      border-top: 1px solid #f1f5f9;
      color: #94a3b8;
      font-size: 12px;
    }
    .footer a { color: #06b6d4; text-decoration: none; }

    /* MOBILE */
    @media (max-width: 640px) {
      .header { padding: 16px 20px; flex-direction: column; gap: 8px; }
      .graphic-box { border-radius: 12px; margin-bottom: 32px; }
      .check-email { letter-spacing: 1px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="https://travelbusinessacademy.github.io/travel-workshop-landing/" class="brand">
      Team Synergy <span>PowerHouse</span>
    </a>
  </header>

  <!-- MAIN CONTENT -->
  <section class="main">

    <!-- GRAPHIC BOX with quote inside -->
    <div class="graphic-box">
      <div class="graphic-box-content">
        <div class="globe">🌍</div>
        <p class="quote">"The world is full of magical things patiently waiting for our wits to grow sharper."</p>
      </div>
    </div>

    <!-- CHECK YOUR EMAIL NOW -->
    <div class="check-email">Check Your Email Now!</div>

    <!-- TEXT -->
    <h1 class="headline">You're <span>In!</span></h1>
    <div class="highlight-text">Thank You for joining Team Synergy Powerhouse.</div>

  </section>

  <!-- FOOTER -->
  <div class="footer">
    &copy; 2025 Travel Business Academy &middot; <a href="#">Privacy Policy</a>
  </div>

</body>
</html>
